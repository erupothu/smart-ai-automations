
<h2 mat-dialog-title> Delete Credential</h2>
<mat-dialog-content>
    <p> Are you sure you want to delete <strong>{{data.credentialName}}</strong>? </p>
    <p class="warn-text">
        <mat-icon class="warn-icon">warning</mat-icon>
        Any workflows referencing this credential will be marked as invalid.
    </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="warn" [mat-dialog-close]="true">Delete</button>
</mat-dialog-actions>
