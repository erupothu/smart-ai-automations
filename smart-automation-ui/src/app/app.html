<div class="app-container">
  <mat-toolbar color="primary">
    <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
      <mat-icon>menu</mat-icon>
    </button>
    <span>Smart Automations</span>
    <span class="spacer"></span>
    <button mat-icon-button (click)="chatbotOpen = !chatbotOpen" aria-label="Toggle chatbot">
      <mat-icon>chat</mat-icon>
    </button>
  </mat-toolbar>

  <div class="content-area">
    <mat-sidenav-container class="sidenav-container">
      <mat-sidenav #sidenav mode="side" opened class="sidenav">
        <mat-nav-list>
          <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
            <mat-icon matListItemIcon>dashboard</mat-icon>
            <span matListItemTitle>Dashboard</span>
          </a>
          <a mat-list-item routerLink="/workflow/new" routerLinkActive="active">
            <mat-icon matListItemIcon>add_circle</mat-icon>
            <span matListItemTitle>New Workflow</span>
          </a>
          <a mat-list-item routerLink="/credentials" routerLinkActive="active">
            <mat-icon matListItemIcon>vpn_key</mat-icon>
            <span matListItemTitle>Credentials</span>
          </a>
        </mat-nav-list>
      </mat-sidenav>

      <mat-sidenav-content class="main-content">
        <router-outlet />
      </mat-sidenav-content>
    </mat-sidenav-container>
    @if (chatbotOpen) {
      <app-chatbot-panel (close)="chatbotOpen = false" />
    }
  </div>
</div>
