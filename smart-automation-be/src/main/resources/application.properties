spring.application.name=smart-automation-be
server.port=9090

spring.data.mongodb.uri=mongodb://localhost:27017/smart-automation
spring.data.mongodb.database=smart-automation

spring.datasource.url=jdbc:h2:mem:smart_automation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=500
spring.ai.ollama.chat.streaming.enabled=false
spring.ai.ollama.init.pull-models-strategy=never

nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.key=
nvidia.api.model=meta/llama-3.1-8b-instruct

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

workflow.execution.default-timeout-seconds=600
workflow.execution.max-retries=3
workflow.execution.max-concurrent-executions=10

mcp.connection.max-retries=3
mcp.connection.retry-backoff=2000
mcp.connection.idle-timeout=30000
mcp.mongodb.enabled=true
mcp.mongodb.command=npx
mcp.mongodb.args=-y,mongodb-mcp-server@latest,--readOnly
mcp.mongodb.timeout=60000
mcp.mongodb.connectionstring=mongodb://localhost:27017/smart-automation

credential.encryption.key=your-encryption-key

management.health.ollama.enabled=false

