spring.application.name=smart-users-custome-mcp
server.port=8083
server.address=127.0.0.1

spring.datasource.url=jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_users_mcp}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.jpa.open-in-view=false

spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=smart-users-custome-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.annotation-scanner.enabled=true
spring.ai.mcp.server.sse-endpoint=/mcp
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
spring.ai.mcp.server.base-url=http://127.0.0.1:8083

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
